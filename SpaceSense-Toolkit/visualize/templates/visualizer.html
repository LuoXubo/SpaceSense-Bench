<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>点云可视化工具</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* 星空效果 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, white, transparent),
                radial-gradient(2px 2px at 60px 70px, white, transparent),
                radial-gradient(1px 1px at 50px 50px, white, transparent),
                radial-gradient(1px 1px at 130px 80px, white, transparent),
                radial-gradient(2px 2px at 90px 10px, white, transparent),
                radial-gradient(1px 1px at 150px 120px, white, transparent),
                radial-gradient(1px 1px at 40px 100px, white, transparent),
                radial-gradient(2px 2px at 170px 40px, white, transparent),
                radial-gradient(1px 1px at 120px 150px, white, transparent),
                radial-gradient(1px 1px at 10px 80px, white, transparent);
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: twinkle 5s ease-in-out infinite;
            opacity: 0.7;
            z-index: -1;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        /* 流星效果 */
        body::after {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: transparent;
            animation: shooting-star 15s linear infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes shooting-star {
            0% {
                background-position: 0% 0%;
            }
            100% {
                background-position: 100% 100%;
            }
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, 
                rgba(15, 23, 42, 0.85) 0%, 
                rgba(30, 41, 59, 0.75) 50%, 
                rgba(15, 23, 42, 0.85) 100%);
            backdrop-filter: blur(15px) saturate(180%);
            color: white;
            padding: 30px;
            text-align: center;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
            box-shadow: 
                0 4px 30px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .content {
            display: flex;
            height: calc(100vh - 200px);
        }

        .sidebar {
            width: 350px;
            background: #f8f9fa;
            padding: 25px;
            overflow-y: auto;
            border-right: 2px solid #e0e0e0;
        }

        .main-view {
            flex: 1;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .view-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            flex: 1;
        }

        .view-panel {
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            background: white;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .view-panel h3 {
            margin-bottom: 10px;
            color: #333;
            font-size: 18px;
            text-align: center;
        }

        .image-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
            border-radius: 8px;
            overflow: hidden;
        }

        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 4px;
        }

        .image-info {
            text-align: center;
            padding: 5px;
            color: #666;
            font-size: 12px;
            background: #f0f0f0;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .control-group {
            margin-bottom: 25px;
        }

        .control-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
            font-size: 14px;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        select:hover {
            border-color: #4a90e2;
        }

        select:focus {
            outline: none;
            border-color: #4a90e2;
        }

        .slider-container {
            margin-top: 10px;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 5px;
            background: #ddd;
            outline: none;
            margin-top: 10px;
        }

        input[type="range"]::-webkit-slider-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #4a90e2;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(74, 144, 226, 0.5);
        }

        .frame-info {
            text-align: center;
            padding: 10px;
            background: #e9ecef;
            border-radius: 8px;
            margin-top: 10px;
            font-weight: 600;
            color: #495057;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #374151 0%, #4b5563 100%);
            color: white;
        }

        .btn-secondary:hover {
            background: linear-gradient(135deg, #1f2937 0%, #374151 100%);
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
        }

        .stats {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
        }

        .stats h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 16px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            padding: 8px;
            margin-bottom: 8px;
            background: #f8f9fa;
            border-radius: 6px;
        }

        .color-box {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            margin-right: 10px;
            border: 1px solid #ddd;
        }

        .stat-label {
            flex: 1;
            font-size: 13px;
            font-weight: 600;
        }

        .stat-count {
            font-size: 13px;
            color: #666;
        }

        #plotDiv {
            width: 100%;
            height: 100%;
            min-height: 400px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .error {
            padding: 15px;
            background: #f8d7da;
            color: #721c24;
            border-radius: 8px;
            margin-top: 10px;
        }

        .info-box {
            padding: 15px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.15) 0%, rgba(30, 58, 138, 0.15) 100%);
            color: #1e40af;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .button-group button {
            flex: 1;
            padding: 10px;
            font-size: 14px;
        }

        /* 响应式设计 */
        @media (max-width: 1400px) {
            .view-container {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .content {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 2px solid #e0e0e0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛰️ 卫星点云可视化工具</h1>
            <p>交互式 3D 点云数据浏览器</p>
        </div>

        <div class="content">
            <div class="sidebar">
                <div class="info-box">
                    💡 选择卫星后将自动显示第一帧数据
                </div>

                <div class="control-group">
                    <label>🛰️ 选择卫星 (Sequence)</label>
                    <select id="satelliteSelect" onchange="onSatelliteChange()">
                        <option value="">-- 请选择 --</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>🎞️ 选择帧</label>
                    <div class="frame-info" id="frameInfo">0 / 0</div>
                    <div class="slider-container">
                        <input type="range" id="frameSlider" min="0" max="0" value="0" 
                               oninput="updateFrameInfo()" 
                               onchange="onFrameSliderChange()">
                    </div>
                </div>
                
                <div class="button-group">
                    <button class="btn-secondary" onclick="previousFrame()">⬅️ 上一帧</button>
                    <button class="btn-secondary" onclick="nextFrame()">下一帧 ➡️</button>
                </div>

                <div class="stats" id="statsPanel" style="display: none;">
                    <h3>📊 统计信息</h3>
                    <div id="statsContent"></div>
                </div>
            </div>

            <div class="main-view">
                <div class="view-container">
                    <div class="view-panel">
                        <h3>📷 相机图像 (Image)</h3>
                        <div class="image-container" id="imageContainer">
                            <div class="loading" style="color: #999;">请选择数据并点击"显示点云"</div>
                        </div>
                    </div>
                    <div class="view-panel">
                        <h3>☁️ 3D 点云 (Point Cloud)</h3>
                        <div id="plotDiv" style="flex: 1;">
                            <div class="loading" style="color: #999; padding-top: 100px;">请选择数据并点击"显示点云"</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let satellites = [];
        let frames = [];
        let currentSequenceId = '';
        let currentSatelliteName = '';
        let currentFrameIndex = 0;

        // 页面加载时获取卫星列表
        window.onload = function() {
            loadSatellites();
        };

        async function loadSatellites() {
            try {
                const response = await fetch('/api/satellites');
                const data = await response.json();
                if (data.success) {
                    satellites = data.satellites;
                    const select = document.getElementById('satelliteSelect');
                    satellites.forEach(sat => {
                        const option = document.createElement('option');
                        option.value = sat.id;  // 使用序号作为value
                        option.textContent = `${sat.id} - ${sat.name}`;  // 显示 "序号 - 卫星名"
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('加载卫星列表失败:', error);
            }
        }

        async function onSatelliteChange() {
            const select = document.getElementById('satelliteSelect');
            currentSequenceId = select.value;
            
            if (!currentSequenceId) return;

            // 找到对应的卫星名称
            const sat = satellites.find(s => s.id === currentSequenceId);
            currentSatelliteName = sat ? sat.name : currentSequenceId;

            // 重置帧列表
            frames = [];
            updateFrameInfo();

            try {
                const response = await fetch(`/api/frames/${currentSequenceId}`);
                const data = await response.json();
                if (data.success) {
                    frames = data.frames;
                    currentFrameIndex = 0;
                    
                    const slider = document.getElementById('frameSlider');
                    slider.max = frames.length - 1;
                    slider.value = 0;
                    
                    updateFrameInfo();
                    
                    // 自动加载第一帧
                    if (frames.length > 0) {
                        loadPointCloud();
                    }
                }
            } catch (error) {
                console.error('加载帧列表失败:', error);
            }
        }

        // 移除轨迹选择功能（已不需要）
        async function onTrajectoryChange() {
            // 不再使用
        }

        function onFrameSliderChange() {
            const slider = document.getElementById('frameSlider');
            currentFrameIndex = parseInt(slider.value);
            updateFrameInfo();
            
            // 自动加载当前帧
            if (frames.length > 0) {
                loadPointCloud();
            }
        }

        function updateFrameInfo() {
            const slider = document.getElementById('frameSlider');
            const index = parseInt(slider.value);
            const info = document.getElementById('frameInfo');
            if (frames.length > 0) {
                info.textContent = `${index + 1} / ${frames.length} - ${frames[index]}`;
            } else {
                info.textContent = '0 / 0';
            }
        }

        function previousFrame() {
            const slider = document.getElementById('frameSlider');
            const index = parseInt(slider.value);
            if (index > 0) {
                slider.value = index - 1;
                currentFrameIndex = index - 1;
                updateFrameInfo();
                loadPointCloud();
            }
        }

        function nextFrame() {
            const slider = document.getElementById('frameSlider');
            const index = parseInt(slider.value);
            if (index < frames.length - 1) {
                slider.value = index + 1;
                currentFrameIndex = index + 1;
                updateFrameInfo();
                loadPointCloud();
            }
        }

        async function loadPointCloud() {
            if (!currentSequenceId || frames.length === 0) {
                alert('请先选择卫星和帧');
                return;
            }

            const frameId = frames[currentFrameIndex];
            
            // 显示加载中
            document.getElementById('plotDiv').innerHTML = 
                '<div class="loading">⏳ 加载点云数据中...</div>';
            document.getElementById('imageContainer').innerHTML = 
                '<div class="loading">⏳ 加载图像中...</div>';

            try {
                // 加载点云数据
                const response = await fetch(
                    `/api/pointcloud/${currentSequenceId}/${frameId}`
                );
                const data = await response.json();
                
                if (data.success) {
                    visualizePointCloud(data);
                    updateStats(data);
                } else {
                    document.getElementById('plotDiv').innerHTML = 
                        `<div class="error">❌ 加载失败: ${data.error}</div>`;
                }

                // 加载图像
                loadImage(frameId);
            } catch (error) {
                document.getElementById('plotDiv').innerHTML = 
                    `<div class="error">❌ 加载失败: ${error.message}</div>`;
            }
        }

        function loadImage(frameId) {
            const imageUrl = `/api/image/${currentSequenceId}/${frameId}`;
            const img = new Image();
            
            img.onload = function() {
                const imageHtml = `
                    <div style="width: 100%; height: 100%; display: flex; flex-direction: column;">
                        <div class="image-info">分辨率: ${img.width} × ${img.height}</div>
                        <div style="flex: 1; display: flex; align-items: center; justify-content: center; overflow: auto;">
                            <img src="${imageUrl}" alt="Frame ${frameId}">
                        </div>
                    </div>
                `;
                document.getElementById('imageContainer').innerHTML = imageHtml;
            };
            
            img.onerror = function() {
                document.getElementById('imageContainer').innerHTML = 
                    '<div class="error">❌ 图像加载失败或不存在</div>';
            };
            
            img.src = imageUrl;
        }

        function visualizePointCloud(data) {
            const points = data.points;
            const labels = data.labels;
            
            // ⚠️ 关键修复: 清理旧的Plotly图表,释放WebGL上下文,防止"Too many active WebGL contexts"错误
            const plotDiv = document.getElementById('plotDiv');
            if (plotDiv && plotDiv.data) {
                Plotly.purge(plotDiv);
            }
            
            // 从后端获取的颜色映射
            const colorMap = {};
            if (data.label_stats) {
                for (const [labelId, info] of Object.entries(data.label_stats)) {
                    const color = info.color;
                    colorMap[labelId] = `rgb(${color[0]}, ${color[1]}, ${color[2]})`;
                }
            }

            // 准备数据
            const x = points.map(p => p[0]);
            const y = points.map(p => p[1]);
            const z = points.map(p => p[2]);
            
            let colors;
            if (labels) {
                colors = labels.map(l => colorMap[l] || 'rgb(128, 128, 128)');
            } else {
                colors = 'rgb(100, 100, 100)';
            }

            const trace = {
                type: 'scatter3d',
                mode: 'markers',
                x: x,
                y: y,
                z: z,
                marker: {
                    size: 2,
                    color: colors,
                    opacity: 0.8
                },
                hovertemplate: 'X: %{x:.2f}<br>Y: %{y:.2f}<br>Z: %{z:.2f}<extra></extra>'
            };

            const layout = {
                title: `${currentSatelliteName} (Seq ${currentSequenceId}) - Frame ${currentFrameIndex + 1}/${frames.length}`,
                scene: {
                    xaxis: { 
                        title: 'X (前)'
                    },
                    yaxis: { 
                        title: 'Y (右)',
                        autorange: 'reversed' // 反转Y轴，让正值在右
                    },
                    zaxis: { 
                        title: 'Z (下)',
                        autorange: 'reversed'  // 反转Z轴，让正值在下方
                    },
                    aspectmode: 'data',  // 使用cube模式确保所有点云可见
                    camera: {
                        eye: { x: -2.5, y: 0, z: 0 },  // 增加相机距离，从前方看向后方
                        center: { x: 0, y: 0, z: 0 }
                    }
                },
                margin: { l: 0, r: 0, t: 40, b: 0 },
                paper_bgcolor: 'white',
                plot_bgcolor: 'white'
            };

            const config = {
                responsive: true,
                displayModeBar: true,
                displaylogo: false
            };

            Plotly.newPlot('plotDiv', [trace], layout, config);
        }

        function updateStats(data) {
            const statsPanel = document.getElementById('statsPanel');
            const statsContent = document.getElementById('statsContent');
            
            if (data.label_stats) {
                statsPanel.style.display = 'block';
                
                let html = `<div class="stat-item">
                    <span class="stat-label">总点数</span>
                    <span class="stat-count">${data.point_count}</span>
                </div>`;
                
                for (const [labelId, info] of Object.entries(data.label_stats)) {
                    const color = `rgb(${info.color[0]}, ${info.color[1]}, ${info.color[2]})`;
                    html += `
                        <div class="stat-item">
                            <div class="color-box" style="background-color: ${color}"></div>
                            <span class="stat-label">${info.name}</span>
                            <span class="stat-count">${info.count}</span>
                        </div>
                    `;
                }
                
                statsContent.innerHTML = html;
            } else {
                statsPanel.style.display = 'none';
            }
        }
    </script>
</body>
</html>
